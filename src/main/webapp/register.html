<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统注册</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        .box { border: 1px solid #ccc; padding: 30px; width: 300px; margin: 0 auto; border-radius: 8px; }
        input { margin: 10px 0; padding: 8px; width: 80%; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>新用户注册</h2>
    <form action="register" method="post">
        <input type="text" name="username" placeholder="请输入用户名 (测试后门: 1TEXT1)" required><br>
        <input type="password" name="password" placeholder="请输入密码" required><br>
        <button type="submit">注 册</button>
    </form>
    <p><a href="login.html">已有账号？去登录</a></p>
</div>
</body>
</html>
