<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员 - 菜品管理</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            padding: 40px;
            margin: 0;
        }

        h2 { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
        .tip { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .form-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02), 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #334155; }

        input {
            margin-bottom: 20px;
            padding: 10px 14px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220,53,69,0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #bd2130;
            box-shadow: 0 4px 12px rgba(220,53,69,0.25);
            transform: translateY(-1px);
        }

        .links-group { margin-top: 30px; }

        .nav-link:link, .nav-link:visited {
            display: inline-block;
            margin-bottom: 12px;
            color: #475569;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-link:hover { color: #dc3545; transform: translateX(4px); }
    </style>
</head>
<body>
<h2>👨‍🍳 管理员控制台：上架新菜品</h2>
<div class="tip">注意：如果菜品名称已存在，系统会自动合并记录，仅为您叠加库存量。</div>

<div class="form-box">
    <form action="/admin/menu/save" method="post">
        <label>菜品名称</label>
        <input type="text" name="name" required>

        <label>单价 (元)</label>
        <input type="number" step="0.01" name="price" required>

        <label>入库数量</label>
        <input type="number" name="stock" required>

        <button type="submit">确认上架</button>
    </form>
</div>

<div class="links-group">
    <a href="/admin/dashboard" class="nav-link">查看销量数据监测面板 →</a><br>
    <a href="/menu" class="nav-link">返回前台点餐页面 →</a>
</div>
</body>
</html>
