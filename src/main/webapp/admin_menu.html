<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员 - 菜品管理</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-box { border: 1px solid #ccc; padding: 20px; width: 400px; margin-top: 20px; }
        input { margin-bottom: 10px; padding: 5px; width: 90%; }
        button { padding: 8px 15px; background-color: #dc3545; color: white; border: none; }
    </style>
</head>
<body>
<h2>👨‍🍳 管理员控制台：上架新菜品</h2>
<p>注意：如果菜品名称已存在，系统会自动合并记录，仅为您叠加库存量。</p>

<div class="form-box">
    <form action="/admin/menu/save" method="post">
        <label>菜品名称：</label><br>
        <input type="text" name="name" required><br>

        <label>单价 (元)：</label><br>
        <input type="number" step="0.01" name="price" required><br>

        <label>入库数量：</label><br>
        <input type="number" name="stock" required><br>

        <button type="submit">确认上架</button>
    </form>
</div>
<br>
<a href="/admin/dashboard">查看销量数据监测面板 -></a><br>
<a href="/menu">返回前台点餐页面 -></a>
</body>
</html>
