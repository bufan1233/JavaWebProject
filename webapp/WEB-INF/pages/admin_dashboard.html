<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>销售额监测面板</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(15,23,42,0.04);
        }
        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 25px;
        }
        th, td { padding: 16px 20px; text-align: left; }
        th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
            border-bottom: 2px solid #edf2f7;
        }
        td { border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        tr:hover td { background-color: #f8fafc; }

        .revenue-cell { font-weight: 700; color: #10b981; }

        .top-row td { background-color: #f0fdf4 !important; }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            background: #f59e0b;
            color: #fff;
            margin-left: 5px;
        }

        .nav-link:link, .nav-link:visited {
            display: inline-block;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover { color: #0f172a; transform: translateX(-4px); }
    </style>
</head>
<body>
<div class="container">
    <h2>📈 核心经营数据监测 (按销售额排序)</h2>
    <table>
        <thead>
        <tr>
            <th>排行</th>
            <th>菜品名称</th>
            <th>单价</th>
            <th>销量 (份)</th>
            <th>总销售额 (元)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="stat, status : ${statsList}" th:class="${status.first} ? 'top-row' : ''">
            <td>
                <span th:text="${status.count}">1</span>
                <span th:if="${status.first}" class="badge">TOP</span>
            </td>
            <td th:text="${stat.itemName}" style="font-weight:500;">菜品</td>
            <td th:text="${'￥' + stat.itemPrice}">￥0.00</td>
            <td th:text="${stat.quantity}">0</td>
            <td class="revenue-cell" th:text="${'￥' + stat.status}">￥0.00</td>
        </tr>
        </tbody>
    </table>
    <a href="../admin_menu.html" class="nav-link">← 返回管理中心</a>
</div>
</body>
</html>
