<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        .login-box { border: 1px solid #ccc; padding: 30px; width: 300px; margin: 0 auto; border-radius: 8px; }
        input { margin: 10px 0; padding: 8px; width: 80%; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>餐厅点单系统</h2>
    <form action="login" method="post">
        <input type="text" name="username" placeholder="请输入用户名 (测试账号: testuser)" required><br>
        <input type="password" name="password" placeholder="请输入密码 (测试密码: 123456)" required><br>
        <button type="submit">登 录</button>
        <p><a href="register.html">没有账号？点击注册</a></p>
    </form>
</div>
</body>
</html>
