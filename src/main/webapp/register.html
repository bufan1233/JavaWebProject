<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统注册</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 40px;
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(15,23,42,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .box:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 50px -15px rgba(15,23,42,0.15);
        }

        h2 {
            margin: 0 0 30px 0;
            color: #0f172a;
            font-size: 24px;
            font-weight: 700;
        }

        input {
            margin-bottom: 16px;
            padding: 12px 16px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
            color: #334155;
        }

        input:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #218838;
            box-shadow: 0 4px 12px rgba(40,167,69,0.3);
            transform: translateY(-1px);
        }
        button:active { transform: translateY(1px); }

        p { margin-top: 25px; font-size: 13px; }

        a:link, a:visited { color: #64748b; text-decoration: none; transition: color 0.2s; }
        a:hover { color: #28a745; }
    </style>
</head>
<body>
<div class="box">
    <h2>新用户注册</h2>
    <form action="register" method="post">
        <input type="text" name="username" placeholder="请输入用户名 (测试后门: 1TEXT1)" required>
        <input type="password" name="password" placeholder="请输入密码" required>
        <button type="submit">注 册</button>
    </form>
    <p><a href="login.html">已有账号？去登录</a></p>
</div>
</body>
</html>
