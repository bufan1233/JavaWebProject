<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>欢迎光临 - 扫码点餐系统</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #27ae60 0%, #11998e 100%);
            --ambient-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.12),
            0 20px 40px -15px rgba(15, 23, 42, 0.08),
            0 1px 3px rgba(15, 23, 42, 0.05);
            --hover-shadow: 0 35px 60px -15px rgba(15, 23, 42, 0.18),
            0 12px 25px -10px rgba(39, 174, 96, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #cbd5e1 100%);
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .login-container {
            display: flex;
            width: 850px;
            height: 500px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: var(--ambient-shadow);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-container:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
        }

        .login-sidebar {
            flex: 1.1;
            background: var(--primary-gradient);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: inset -10px 0 20px -10px rgba(0, 0, 0, 0.1);
        }

        .login-sidebar::before {
            content: ''; position: absolute; width: 300px; height: 300px;
            background: rgba(255,255,255,0.12); border-radius: 50%; top: -50px; left: -50px;
            filter: blur(20px);
        }

        .brand-logo { font-size: 28px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 4px 8px rgba(0,0,0,0.08); }
        .brand-slogan h1 { font-size: 32px; margin: 0 0 10px 0; font-weight: 700; line-height: 1.2; text-shadow: 0 4px 12px rgba(0,0,0,0.1); }
        .brand-slogan p { margin: 0; font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; }

        .login-form-section { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; background: #ffffff; }
        h2 { margin: 0 0 8px 0; color: #0f172a; font-size: 24px; font-weight: 700; }
        .sub-title { color: #64748b; font-size: 13px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            padding: 14px 16px; width: 100%; box-sizing: border-box;
            border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px;
            background: #f8fafc; transition: all 0.25s ease; color: #334155;
            box-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.02);
        }

        input:focus {
            outline: none; border-color: #27ae60; background: #ffffff;
            box-shadow: 0 0 0 4px rgba(39,174,96,0.1), 0 4px 10px rgba(39,174,96,0.03);
        }

        button {
            width: 100%; padding: 14px; background: var(--primary-gradient); color: white;
            border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); margin-top: 10px;
            box-shadow: 0 6px 16px -4px rgba(39,174,96,0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -4px rgba(39,174,96,0.4);
        }

        .form-footer { margin-top: 25px; font-size: 13px; text-align: center; }
        a:link, a:visited { color: #64748b; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        a:hover { color: #27ae60; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-sidebar">
        <div class="brand-logo">🍽️ SmartEat</div>
        <div class="brand-slogan">
            <h1>欢迎光临<br>享用今日美味</h1>
            <p>无需排队，即扫即点。请在右侧输入您的账号或桌号登入系统开始点餐。</p>
        </div>
        <div style="font-size: 12px; color: rgba(255,255,255,0.5);">© 2026 智慧餐厅点单系统.</div>
    </div>

    <div class="login-form-section">
        <h2>欢迎就座</h2>
        <div class="sub-title">请输入您的顾客账号 / 临时点餐码</div>

        <form action="/login" method="post">
            <div class="input-group"><input type="text" name="username" placeholder="请输入手机号 / 桌号" required></div>
            <div class="input-group"><input type="password" name="password" placeholder="请输入密码 / 点餐验证码" required></div>
            <button type="submit">登 录 点 餐</button>
        </form>

        <div class="form-footer">
            <a href="register.html">首次光临？注册新账号 →</a>
        </div>
    </div>
</div>

</body>
</html>
